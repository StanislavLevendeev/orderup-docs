swagger: '2.0'
info:
  title: OrderUp API
  version: 2.0.0
  description: >
    API documentation for the OrderUp microservices platform.


    External client traffic is handled by NGINX API Gateway, which routes
    requests to domain services.

    Service discovery is handled by Consul so service instances can register and
    be resolved dynamically.


    Communication patterns:

    - Synchronous: REST + JSON for operations that require immediate responses.

    - Asynchronous: ActiveMQ message topics for order and order-item status
    change events.

    - Real-time push: WebSocket topics for kitchen/tablet updates.
host: localhost:8082
basePath: ''
schemes:
  - https
  - http
consumes:
  - application/json
produces:
  - application/json
tags:
  - name: menu
    description: Menu management
  - name: menu-item
    description: Menu item management
  - name: order
    description: Order and order item operations
  - name: order-status
    description: Order and order-item status tracking
  - name: payment
    description: Payment registration and status
  - name: notification
    description: WebSocket notification operations
paths:
  /menus:
    get:
      tags:
        - menu
      summary: List menus
      operationId: listMenus
      parameters:
        - name: active
          in: query
