        '409': *ref_3
      description: >-


        Access Control: Endpoint requires specific authenticated Roles. See
        implementation.
    post:
      tags:
        - order
      summary: Create order
      operationId: createOrder
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/OrderCreateRequest'
      responses:
        '201':
