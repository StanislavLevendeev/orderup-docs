            $ref: '#/definitions/MenuItemUpdateRequest'
      responses:
        '200':
          description: Menu item updated
          schema:
            $ref: '#/definitions/MenuItem'
        '400': *ref_0
        '401': *ref_1
        '403': *ref_2
        '404':
          $ref: '#/responses/NotFound'
        '409': *ref_3
      description: >-


        Access Control: Endpoint requires specific authenticated Roles. See
