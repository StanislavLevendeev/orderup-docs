            type: array
            items:
              $ref: '#/definitions/Menu'
        '400': &ref_0
          $ref: '#/responses/BadRequest'
        '401': &ref_1
          $ref: '#/responses/Unauthorized'
        '403': &ref_2
          $ref: '#/responses/Forbidden'
        '409': &ref_3
          $ref: '#/responses/Conflict'
      description: >-


        Access Control: Endpoint requires specific authenticated Roles. See
        implementation.
    post:
      tags:
        - menu
      summary: Create a menu
      operationId: createMenu
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/MenuCreateRequest'
      responses:
        '201':
          description: Menu created
          schema:
            $ref: '#/definitions/Menu'
        '400': *ref_0
        '401': *ref_1
        '403': *ref_2
        '409': *ref_3
      description: >-


        Access Control: Endpoint requires specific authenticated Roles. See
        implementation.
