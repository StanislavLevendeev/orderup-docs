---
swagger: "2.0"
info:
  title: "OrderUp API"
  version: "2.0.0"
  description: |
    API documentation for the OrderUp microservices platform.

    External client traffic is handled by NGINX API Gateway, which routes requests to domain services.
    Service discovery is handled by Consul so service instances can register and be resolved dynamically.

    Communication patterns:
    - Synchronous: REST + JSON for operations that require immediate responses.
    - Asynchronous: ActiveMQ message topics for order and order-item status change events.
    - Real-time push: WebSocket topics for kitchen/tablet updates.

host: "api.orderup.local"
basePath: "/api/v1"
schemes:
  - "https"
  - "http"
consumes:
  - "application/json"
produces:
  - "application/json"
tags:
  - name: "menu"
    description: "Menu and menu item management"
  - name: "order"
    description: "Order and order item operations"
  - name: "order-status"
    description: "Order and order-item status tracking"
  - name: "payment"
    description: "Payment registration and status"
  - name: "notification"
    description: "WebSocket notification operations"
  - name: "health"
    description: "Gateway/service health checks"

x-api-gateway:
  provider: "nginx"
  routing:
    - pathPrefix: "/api/v1/menu"
      targetService: "menu-service"
    - pathPrefix: "/api/v1/orders"
      targetService: "order-service"
    - pathPrefix: "/api/v1/order-status"
      targetService: "order-status-tracking-service"
    - pathPrefix: "/api/v1/payments"
      targetService: "payment-service"
    - pathPrefix: "/api/v1/notifications"
      targetService: "order-notification-service"
x-service-discovery:
  provider: "consul"
  description: "Services register and discover each other dynamically via Consul."
x-async-messaging:
  broker: "activemq"
  topics:
    - name: "order-item-status-changed"
      payloadRef: "#/definitions/OrderItemStatusChangedEvent"
      publisher: "order-status-tracking-service"
      subscribers:
        - "order-notification-service"
    - name: "order-status-changed"
      payloadRef: "#/definitions/OrderStatusChangedEvent"
      publisher: "order-status-tracking-service"
      subscribers:
        - "order-notification-service"
x-websocket:
  endpoint: "/api/v1/notifications/ws"
  topicPattern: "/topic/orders/{orderId}"
  description: "Order Notification Service pushes real-time updates to clients subscribed to order-specific topics."

paths:
  /menu/menus:
    get:
      tags:
        - "menu"
      summary: "List menus"
      operationId: "listMenus"
      parameters:
        - name: "active"
          in: "query"
          required: false
          type: "boolean"
          description: "Filter only active menus"
      responses:
        200:
          description: "Menus returned"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/Menu"
    post:
      tags:
        - "menu"
      summary: "Create a menu"
      operationId: "createMenu"
      parameters:
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/MenuCreateRequest"
      responses:
        201:
          description: "Menu created"
          schema:
            $ref: "#/definitions/Menu"

  /menu/menus/{menuId}:
    get:
      tags:
        - "menu"
      summary: "Get menu by ID"
      operationId: "getMenuById"
      parameters:
        - $ref: "#/parameters/MenuIdPathParam"
      responses:
        200:
          description: "Menu returned"
          schema:
            $ref: "#/definitions/Menu"
        404:
          $ref: "#/responses/NotFound"
    put:
      tags:
        - "menu"
      summary: "Update menu"
      operationId: "updateMenu"
      parameters:
        - $ref: "#/parameters/MenuIdPathParam"
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/MenuUpdateRequest"
      responses:
        200:
          description: "Menu updated"
          schema:
            $ref: "#/definitions/Menu"
        404:
          $ref: "#/responses/NotFound"
    delete:
      tags:
        - "menu"
      summary: "Delete menu"
      operationId: "deleteMenu"
      parameters:
        - $ref: "#/parameters/MenuIdPathParam"
      responses:
        204:
          description: "Menu deleted"
        404:
          $ref: "#/responses/NotFound"

  /menu/menus/{menuId}/items:
    get:
      tags:
        - "menu"
      summary: "List menu items for a menu"
      operationId: "listMenuItems"
      parameters:
        - $ref: "#/parameters/MenuIdPathParam"
        - name: "available"
          in: "query"
          required: false
          type: "boolean"
      responses:
        200:
          description: "Menu items returned"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/MenuItem"
        404:
          $ref: "#/responses/NotFound"
    post:
      tags:
        - "menu"
      summary: "Create menu item"
      operationId: "createMenuItem"
      parameters:
        - $ref: "#/parameters/MenuIdPathParam"
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/MenuItemCreateRequest"
      responses:
        201:
          description: "Menu item created"
          schema:
            $ref: "#/definitions/MenuItem"
        404:
          $ref: "#/responses/NotFound"

  /menu/items/{menuItemId}:
    get:
      tags:
        - "menu"
      summary: "Get menu item by ID"
      operationId: "getMenuItemById"
      parameters:
        - $ref: "#/parameters/MenuItemIdPathParam"
      responses:
        200:
          description: "Menu item returned"
          schema:
            $ref: "#/definitions/MenuItem"
        404:
          $ref: "#/responses/NotFound"
    put:
      tags:
        - "menu"
      summary: "Update menu item"
      operationId: "updateMenuItem"
      parameters:
        - $ref: "#/parameters/MenuItemIdPathParam"
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/MenuItemUpdateRequest"
      responses:
        200:
          description: "Menu item updated"
          schema:
            $ref: "#/definitions/MenuItem"
        404:
          $ref: "#/responses/NotFound"
    delete:
      tags:
        - "menu"
      summary: "Delete menu item"
      operationId: "deleteMenuItem"
      parameters:
        - $ref: "#/parameters/MenuItemIdPathParam"
      responses:
        204:
          description: "Menu item deleted"
        404:
          $ref: "#/responses/NotFound"

  /orders:
    get:
      tags:
        - "order"
      summary: "List orders"
      operationId: "listOrders"
      parameters:
        - name: "source"
          in: "query"
          required: false
          type: "string"
          enum:
            - "TABLET"
            - "WAITER"
            - "KIOSK"
            - "WEB"
        - name: "status"
          in: "query"
          required: false
          type: "string"
          enum:
            - "PLACED"
            - "IN_PREPARATION"
            - "READY"
            - "SERVED"
            - "CANCELLED"
      responses:
        200:
          description: "Orders returned"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/Order"
    post:
      tags:
        - "order"
      summary: "Create order"
      operationId: "createOrder"
      parameters:
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/OrderCreateRequest"
      responses:
        201:
          description: "Order created"
          schema:
            $ref: "#/definitions/Order"

  /orders/{orderId}:
    get:
      tags:
        - "order"
      summary: "Get order by ID"
      operationId: "getOrderById"
      parameters:
        - $ref: "#/parameters/OrderIdPathParam"
      responses:
        200:
          description: "Order returned"
          schema:
            $ref: "#/definitions/Order"
        404:
          $ref: "#/responses/NotFound"

  /orders/{orderId}/items:
    post:
      tags:
        - "order"
      summary: "Add item to order"
      operationId: "addOrderItem"
      parameters:
        - $ref: "#/parameters/OrderIdPathParam"
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/OrderItemCreateRequest"
      responses:
        201:
          description: "Order item added"
          schema:
            $ref: "#/definitions/OrderItem"
        404:
          $ref: "#/responses/NotFound"

  /orders/{orderId}/items/{orderItemId}:
    put:
      tags:
        - "order"
      summary: "Update quantity of an order item"
      operationId: "updateOrderItem"
      parameters:
        - $ref: "#/parameters/OrderIdPathParam"
        - $ref: "#/parameters/OrderItemIdPathParam"
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/OrderItemUpdateRequest"
      responses:
        200:
          description: "Order item updated"
          schema:
            $ref: "#/definitions/OrderItem"
        404:
          $ref: "#/responses/NotFound"
    delete:
      tags:
        - "order"
      summary: "Remove item from order"
      operationId: "deleteOrderItem"
      parameters:
        - $ref: "#/parameters/OrderIdPathParam"
        - $ref: "#/parameters/OrderItemIdPathParam"
      responses:
        204:
          description: "Order item removed"
        404:
          $ref: "#/responses/NotFound"

  /payments/orders/{orderId}:
    get:
      tags:
        - "payment"
      summary: "Get payment by order ID"
      operationId: "getPaymentByOrderId"
      parameters:
        - $ref: "#/parameters/OrderIdPathParam"
      responses:
        200:
          description: "Payment returned"
          schema:
            $ref: "#/definitions/Payment"
        404:
          $ref: "#/responses/NotFound"
    post:
      tags:
        - "payment"
      summary: "Register payment for order"
      operationId: "createPayment"
      parameters:
        - $ref: "#/parameters/OrderIdPathParam"
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/PaymentCreateRequest"
      responses:
        201:
          description: "Payment created"
          schema:
            $ref: "#/definitions/Payment"
        404:
          $ref: "#/responses/NotFound"

  /order-status/orders/{orderId}/history:
    get:
      tags:
        - "order-status"
      summary: "Get order status history"
      operationId: "getOrderStatusHistory"
      parameters:
        - $ref: "#/parameters/OrderIdPathParam"
      responses:
        200:
          description: "Order status history returned"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/OrderStatusHistory"
        404:
          $ref: "#/responses/NotFound"
    post:
      tags:
        - "order-status"
      summary: "Append order status event"
      description: "Also publishes OrderStatusChangedEvent to ActiveMQ topic order-status-changed."
      operationId: "appendOrderStatus"
      parameters:
        - $ref: "#/parameters/OrderIdPathParam"
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/OrderStatusHistoryCreateRequest"
      responses:
        201:
          description: "Order status event appended"
          schema:
            $ref: "#/definitions/OrderStatusHistory"
        404:
          $ref: "#/responses/NotFound"

  /order-status/order-items/{orderItemId}/history:
    get:
      tags:
        - "order-status"
      summary: "Get order item status history"
      operationId: "getOrderItemStatusHistory"
      parameters:
        - $ref: "#/parameters/OrderItemIdPathParam"
      responses:
        200:
          description: "Order item status history returned"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/OrderItemStatusHistory"
        404:
          $ref: "#/responses/NotFound"
    post:
      tags:
        - "order-status"
      summary: "Append order item status event"
      description: "Also publishes OrderItemStatusChangedEvent to ActiveMQ topic order-item-status-changed."
      operationId: "appendOrderItemStatus"
      parameters:
        - $ref: "#/parameters/OrderItemIdPathParam"
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/OrderItemStatusHistoryCreateRequest"
      responses:
        201:
          description: "Order item status event appended"
          schema:
            $ref: "#/definitions/OrderItemStatusHistory"
        404:
          $ref: "#/responses/NotFound"

  /notifications/ws:
    get:
      tags:
        - "notification"
      summary: "WebSocket handshake endpoint"
      description: |
        HTTP upgrade endpoint used by clients to establish WebSocket sessions.
        After connecting, clients subscribe to destination /topic/orders/{orderId}
        to receive order-specific real-time status updates.
      operationId: "websocketHandshake"
      produces:
        - "application/json"
      responses:
        101:
          description: "Switching Protocols"
        426:
          description: "Upgrade Required"

  /notifications/orders/{orderId}/subscriptions:
    get:
      tags:
        - "notification"
      summary: "Get active subscription count for order topic"
      operationId: "getOrderTopicSubscriptions"
      parameters:
        - $ref: "#/parameters/OrderIdPathParam"
      responses:
        200:
          description: "Subscription information returned"
          schema:
            $ref: "#/definitions/OrderTopicSubscriptionInfo"

  /health:
    get:
      tags:
        - "health"
      summary: "Gateway health check"
      operationId: "healthCheck"
      responses:
        200:
          description: "Gateway is healthy"
          schema:
            $ref: "#/definitions/HealthStatus"

parameters:
  MenuIdPathParam:
    name: "menuId"
    in: "path"
    required: true
    type: "string"
    format: "uuid"
  MenuItemIdPathParam:
    name: "menuItemId"
    in: "path"
    required: true
    type: "string"
    format: "uuid"
  OrderIdPathParam:
    name: "orderId"
    in: "path"
    required: true
    type: "string"
    format: "uuid"
  OrderItemIdPathParam:
    name: "orderItemId"
    in: "path"
    required: true
    type: "string"
    format: "uuid"

responses:
  NotFound:
    description: "Entity not found"
    schema:
      $ref: "#/definitions/ErrorResponse"

securityDefinitions:
  bearerAuth:
    type: "apiKey"
    name: "Authorization"
    in: "header"

security:
  - bearerAuth: []

definitions:
  Menu:
    type: "object"
    required:
      - "id"
      - "name"
      - "active"
    properties:
      id:
        type: "string"
        format: "uuid"
      name:
        type: "string"
      active:
        type: "boolean"

  MenuCreateRequest:
    type: "object"
    required:
      - "name"
    properties:
      name:
        type: "string"
      active:
        type: "boolean"
        default: true

  MenuUpdateRequest:
    type: "object"
    properties:
      name:
        type: "string"
      active:
        type: "boolean"

  MenuItem:
    type: "object"
    required:
      - "id"
      - "name"
      - "price"
      - "productId"
      - "available"
    properties:
      id:
        type: "string"
        format: "uuid"
      name:
        type: "string"
      description:
        type: "string"
      imagePath:
        type: "string"
      price:
        type: "number"
        format: "double"
      productId:
        type: "string"
        format: "uuid"
      available:
        type: "boolean"

  MenuItemCreateRequest:
    type: "object"
    required:
      - "name"
      - "price"
      - "productId"
    properties:
      name:
        type: "string"
      description:
        type: "string"
      imagePath:
        type: "string"
      price:
        type: "number"
        format: "double"
      productId:
        type: "string"
        format: "uuid"
      available:
        type: "boolean"
        default: true

  MenuItemUpdateRequest:
    type: "object"
    properties:
      name:
        type: "string"
      description:
        type: "string"
      imagePath:
        type: "string"
      price:
        type: "number"
        format: "double"
      available:
        type: "boolean"

  Order:
    type: "object"
    required:
      - "id"
      - "createdAt"
      - "totalPrice"
      - "source"
    properties:
      id:
        type: "string"
        format: "uuid"
      createdAt:
        type: "string"
        format: "date-time"
      totalPrice:
        type: "number"
        format: "double"
      source:
        type: "string"
        enum:
          - "TABLET"
          - "WAITER"
          - "KIOSK"
          - "WEB"
      items:
        type: "array"
        items:
          $ref: "#/definitions/OrderItem"

  OrderCreateRequest:
    type: "object"
    required:
      - "source"
      - "items"
    properties:
      source:
        type: "string"
        enum:
          - "TABLET"
          - "WAITER"
          - "KIOSK"
          - "WEB"
      items:
        type: "array"
        minItems: 1
        items:
          $ref: "#/definitions/OrderItemCreateRequest"

  OrderItem:
    type: "object"
    required:
      - "id"
      - "orderId"
      - "menuItemId"
      - "quantity"
      - "price"
    properties:
      id:
        type: "string"
        format: "uuid"
      orderId:
        type: "string"
        format: "uuid"
      menuItemId:
        type: "string"
        format: "uuid"
      quantity:
        type: "integer"
        format: "int32"
        minimum: 1
      price:
        type: "number"
        format: "double"

  OrderItemCreateRequest:
    type: "object"
    required:
      - "menuItemId"
      - "quantity"
      - "price"
    properties:
      menuItemId:
        type: "string"
        format: "uuid"
      quantity:
        type: "integer"
        format: "int32"
        minimum: 1
      price:
        type: "number"
        format: "double"

  OrderItemUpdateRequest:
    type: "object"
    required:
      - "quantity"
    properties:
      quantity:
        type: "integer"
        format: "int32"
        minimum: 1

  OrderStatusHistory:
    type: "object"
    required:
      - "id"
      - "orderId"
      - "status"
      - "timestamp"
      - "updatedBy"
    properties:
      id:
        type: "string"
        format: "uuid"
      orderId:
        type: "string"
        format: "uuid"
      status:
        type: "string"
        enum:
          - "PLACED"
          - "IN_PREPARATION"
          - "READY"
          - "SERVED"
          - "CANCELLED"
      timestamp:
        type: "string"
        format: "date-time"
      updatedBy:
        type: "string"

  OrderStatusHistoryCreateRequest:
    type: "object"
    required:
      - "status"
      - "updatedBy"
    properties:
      status:
        type: "string"
        enum:
          - "PLACED"
          - "IN_PREPARATION"
          - "READY"
          - "SERVED"
          - "CANCELLED"
      updatedBy:
        type: "string"

  OrderItemStatusHistory:
    type: "object"
    required:
      - "id"
      - "orderItemId"
      - "status"
      - "timestamp"
      - "updatedBy"
    properties:
      id:
        type: "string"
        format: "uuid"
      orderItemId:
        type: "string"
        format: "uuid"
      status:
        type: "string"
        enum:
          - "PLACED"
          - "IN_PREPARATION"
          - "READY"
          - "SERVED"
          - "CANCELLED"
      timestamp:
        type: "string"
        format: "date-time"
      updatedBy:
        type: "string"

  OrderItemStatusHistoryCreateRequest:
    type: "object"
    required:
      - "status"
      - "updatedBy"
    properties:
      status:
        type: "string"
        enum:
          - "PLACED"
          - "IN_PREPARATION"
          - "READY"
          - "SERVED"
          - "CANCELLED"
      updatedBy:
        type: "string"

  Payment:
    type: "object"
    required:
      - "id"
      - "orderId"
      - "amount"
      - "status"
      - "method"
      - "createdAt"
    properties:
      id:
        type: "string"
        format: "uuid"
      orderId:
        type: "string"
        format: "uuid"
      amount:
        type: "number"
        format: "double"
      status:
        type: "string"
        enum:
          - "PENDING"
          - "AUTHORIZED"
          - "PAID"
          - "FAILED"
          - "REFUNDED"
      method:
        type: "string"
        example: "CARD"
      createdAt:
        type: "string"
        format: "date-time"

  PaymentCreateRequest:
    type: "object"
    required:
      - "amount"
      - "method"
    properties:
      amount:
        type: "number"
        format: "double"
      method:
        type: "string"
        example: "CARD"

  OrderItemStatusChangedEvent:
    type: "object"
    required:
      - "orderId"
      - "orderItemId"
      - "newStatus"
      - "timestamp"
    properties:
      orderId:
        type: "string"
        format: "uuid"
      orderItemId:
        type: "string"
        format: "uuid"
      newStatus:
        type: "string"
        enum:
          - "PLACED"
          - "IN_PREPARATION"
          - "READY"
          - "SERVED"
          - "CANCELLED"
      timestamp:
        type: "string"
        format: "date-time"

  OrderStatusChangedEvent:
    type: "object"
    required:
      - "orderId"
      - "newStatus"
      - "timestamp"
    properties:
      orderId:
        type: "string"
        format: "uuid"
      newStatus:
        type: "string"
        enum:
          - "PLACED"
          - "IN_PREPARATION"
          - "READY"
          - "SERVED"
          - "CANCELLED"
      timestamp:
        type: "string"
        format: "date-time"

  OrderTopicSubscriptionInfo:
    type: "object"
    required:
      - "orderId"
      - "subscriberCount"
    properties:
      orderId:
        type: "string"
        format: "uuid"
      subscriberCount:
        type: "integer"
        format: "int32"
        minimum: 0

  HealthStatus:
    type: "object"
    required:
      - "status"
      - "timestamp"
    properties:
      status:
        type: "string"
        example: "UP"
      timestamp:
        type: "string"
        format: "date-time"

  ErrorResponse:
    type: "object"
    required:
      - "code"
      - "message"
      - "timestamp"
    properties:
      code:
        type: "string"
      message:
        type: "string"
      timestamp:
        type: "string"
        format: "date-time"
