      responses:
        '201':
          description: Order item added
          schema:
            $ref: '#/definitions/OrderItem'
        '400': *ref_0
        '401': *ref_1
        '403': *ref_2
        '404':
          $ref: '#/responses/NotFound'
        '409': *ref_3
      description: >-


        Access Control: Endpoint requires specific authenticated Roles. See
        implementation.
  /orders/{orderId}/items/{orderItemId}:
    put:
      tags:
        - order
      summary: Update quantity of an order item
      operationId: updateOrderItem
      parameters:
        - $ref: '#/parameters/OrderIdPathParam'
        - $ref: '#/parameters/OrderItemIdPathParam'
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/OrderItemUpdateRequest'
      responses:
        '200':
          description: Order item updated
          schema:
            $ref: '#/definitions/OrderItem'
        '400': *ref_0
        '401': *ref_1
        '403': *ref_2
        '404':
          $ref: '#/responses/NotFound'
        '409': *ref_3
      description: >-


        Access Control: Endpoint requires specific authenticated Roles. See
