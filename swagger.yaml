      summary: Remove item from order
      operationId: deleteOrderItem
      parameters:
        - $ref: '#/parameters/OrderIdPathParam'
        - $ref: '#/parameters/OrderItemIdPathParam'
      responses:
        '204':
          description: Order item removed
        '400': *ref_0
        '401': *ref_1
        '403': *ref_2
        '404':
          $ref: '#/responses/NotFound'
        '409': *ref_3
      description: >-


        Access Control: Endpoint requires specific authenticated Roles. See
        implementation.
  /orders/{orderId}/status:
    get:
      tags:
        - order-status
      summary: Get the current order status
      operationId: getOrderStatus
      parameters:
        - $ref: '#/parameters/OrderIdPathParam'
      responses:
        '200':
          description: Order status returned
          schema:
            $ref: '#/definitions/OrderStatus'
        '400': *ref_0
        '401': *ref_1
        '403': *ref_2
        '404':
          $ref: '#/responses/NotFound'
        '409': *ref_3
      description: >-


        Access Control: Endpoint requires specific authenticated Roles. See
        implementation.
    post:
      tags:
        - order-status
      summary: Append order status event
      description: >-
        Also publishes OrderStatusChangedEvent to ActiveMQ topic
        order-status-changed.


        Access Control: Endpoint requires specific authenticated Roles. See
        implementation.
      operationId: appendOrderStatus
      parameters:
        - $ref: '#/parameters/OrderIdPathParam'
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/OrderStatusHistoryCreateRequest'
      responses:
        '201':
          description: Order status event appended
          schema:
            $ref: '#/definitions/OrderStatusHistory'
        '400': *ref_0
        '401': *ref_1
        '403': *ref_2
        '404':
          $ref: '#/responses/NotFound'
        '409': *ref_3
  /orders/{orderId}/status-history:
    get:
      tags:
        - order-status
      summary: Get order status history
      operationId: getOrderStatusHistory
      parameters:
        - $ref: '#/parameters/OrderIdPathParam'
        - $ref: '#/parameters/LimitQueryParam'
        - $ref: '#/parameters/OffsetQueryParam'
      responses:
        '200':
          description: Order status history returned
          schema:
            type: array
            item:
              $ref: '#/definitions/OrderStatusHistory'
        '400': *ref_0
        '401': *ref_1
        '403': *ref_2
        '404':
          $ref: '#/responses/NotFound'
        '409': *ref_3
      description: >-


        Access Control: Endpoint requires specific authenticated Roles. See
        implementation.
  /orders/{orderId}/items/{orderItemId}/status:
    get:
      tags:
        - order-status
      summary: Get the latest order item status
      operationId: getOrderItemStatus
      parameters:
        - $ref: '#/parameters/OrderIdPathParam'
        - $ref: '#/parameters/OrderItemIdPathParam'
      responses:
        '200':
          description: Order item status returned
          schema:
            $ref: '#/definitions/OrderItemStatus'
        '400': *ref_0
        '401': *ref_1
        '403': *ref_2
        '404':
          $ref: '#/responses/NotFound'
        '409': *ref_3
      description: >-


        Access Control: Endpoint requires specific authenticated Roles. See
        implementation.
    post:
      tags:
        - order-status
      summary: Append order item status event
      description: >-
        Also publishes OrderItemStatusChangedEvent to ActiveMQ topic
        order-item-status-changed.


        Access Control: Endpoint requires specific authenticated Roles. See
        implementation.
      operationId: appendOrderItemStatus
      parameters:
        - $ref: '#/parameters/OrderIdPathParam'
        - $ref: '#/parameters/OrderItemIdPathParam'
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/OrderItemStatusHistoryCreateRequest'
      responses:
        '201':
          description: Order item status event appended
          schema:
            $ref: '#/definitions/OrderItemStatusHistory'
        '400': *ref_0
        '401': *ref_1
        '403': *ref_2
        '404':
          $ref: '#/responses/NotFound'
        '409': *ref_3
  /orders/{orderId}/items/{orderItemId}/status-history:
    get:
      tags:
        - order-status
      summary: Get the order item status history
      operationId: getOrderItemStatusHistory
      parameters:
        - $ref: '#/parameters/OrderIdPathParam'
        - $ref: '#/parameters/OrderItemIdPathParam'
        - $ref: '#/parameters/LimitQueryParam'
        - $ref: '#/parameters/OffsetQueryParam'
      responses:
        '200':
          description: Order item status history returned
          schema:
            type: array
            item:
              $ref: '#/definitions/OrderItemStatusHistory'
        '400': *ref_0
        '401': *ref_1
        '403': *ref_2
        '404':
          $ref: '#/responses/NotFound'
        '409': *ref_3
      description: >-


        Access Control: Endpoint requires specific authenticated Roles. See
        implementation.
  /orders/{orderId}/payments:
    get:
      tags:
        - payment
      summary: Get payments by order ID
      operationId: getPaymentByOrderId
      parameters:
        - $ref: '#/parameters/OrderIdPathParam'
      responses:
        '200':
          description: Payments returned
          schema:
            type: array
            items:
              $ref: '#/definitions/Payment'
        '400': *ref_0
        '401': *ref_1
        '403': *ref_2
        '404':
          $ref: '#/responses/NotFound'
        '409': *ref_3
      description: >-


        Access Control: Endpoint requires specific authenticated Roles. See
        implementation.
    post:
      tags:
        - payment
      summary: Register payment for order
      operationId: createPayment
      parameters:
        - $ref: '#/parameters/OrderIdPathParam'
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/PaymentCreateRequest'
      responses:
        '201':
          description: Payment created
          schema:
            $ref: '#/definitions/Payment'
        '400': *ref_0
        '401': *ref_1
        '403': *ref_2
        '404':
          $ref: '#/responses/NotFound'
        '409': *ref_3
      description: >-


        Access Control: Endpoint requires specific authenticated Roles. See
        implementation.
  /payments/{paymentId}:
    get:
      tags:
        - payment
      summary: Get payment by payment ID
      operationId: getPaymentByPaymentId
      parameters:
        - $ref: '#/parameters/PaymentIdPathParam'
      responses:
        '200':
          description: Payment returned
          schema:
            $ref: '#/definitions/Payment'
        '400': *ref_0
        '401': *ref_1
        '403': *ref_2
        '404':
          $ref: '#/responses/NotFound'
        '409': *ref_3
      description: >-


        Access Control: Endpoint requires specific authenticated Roles. See
        implementation.
  /notifications/ws:
    get:
      tags:
        - notification
      summary: WebSocket handshake endpoint
      description: >-
        HTTP upgrade endpoint used by clients to establish WebSocket sessions.

        After connecting, clients subscribe to destination
        /topic/orders/{orderId}

        to receive order-specific real-time status updates.



        Access Control: Endpoint requires specific authenticated Roles. See
        implementation.
      operationId: websocketHandshake
      produces:
        - application/json
      responses:
        '101':
          description: Switching Protocols
        '400': *ref_0
        '401': *ref_1
        '403': *ref_2
        '409': *ref_3
        '426':
          description: Upgrade Required
parameters:
  LimitQueryParam:
    name: limit
    in: query
    required: false
    type: integer
    format: int32
    default: 50
    maximum: 100
    description: Maximum number of items to return
  OffsetQueryParam:
    name: offset
    in: query
    required: false
    type: integer
    format: int32
    default: 0
    description: Number of items to skip
  MenuIdPathParam:
    name: menuId
    in: path
    required: true
    type: string
    format: uuid
  MenuItemIdPathParam:
    name: menuItemId
    in: path
    required: true
    type: string
    format: uuid
  OrderIdPathParam:
    name: orderId
    in: path
    required: true
    type: string
    format: uuid
  PaymentIdPathParam:
    name: paymentId
    in: path
    required: true
    type: string
    format: uuid
  OrderItemIdPathParam:
    name: orderItemId
    in: path
    required: true
    type: string
    format: uuid
responses:
  BadRequest:
    description: Invalid input or badly formatted request
    schema:
      $ref: '#/definitions/ErrorResponse'
  Unauthorized:
    description: Authentication token missing or invalid
    schema:
      $ref: '#/definitions/ErrorResponse'
  Forbidden:
    description: User is missing required roles
    schema:
      $ref: '#/definitions/ErrorResponse'
  NotFound:
    description: Entity not found
    schema:
      $ref: '#/definitions/ErrorResponse'
  Conflict:
    description: Business rule violation or conflict
    schema:
      $ref: '#/definitions/ErrorResponse'
securityDefinitions:
  bearerAuth:
    type: apiKey
    name: Authorization
    in: header
security:
  - bearerAuth: []
definitions:
  Menu:
    type: object
    required:
      - id
      - name
      - active
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
      active:
        type: boolean
      items:
        type: array
        items:
          $ref: '#/definitions/MenuItem'
  MenuCreateRequest:
    type: object
    required:
      - name
      - active
    properties:
      name:
        type: string
        maxLength: 255
      active:
        type: boolean
        default: true
  MenuUpdateRequest:
    type: object
    required:
      - name
      - active
    properties:
      name:
        type: string
        maxLength: 255
      active:
        type: boolean
  MenuItem:
    type: object
    required:
      - id
      - name
      - price
      - available
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
      description:
        type: string
      imagePath:
        type: string
      price:
        type: integer
        format: int64
        description: Value in minor units (cents)
      available:
        type: boolean
  MenuItemCreateRequest:
    type: object
    required:
      - name
      - price
    properties:
      name:
        type: string
        maxLength: 255
      description:
        type: string
        maxLength: 1000
      imagePath:
        type: string
        maxLength: 255
      price:
        type: integer
        format: int64
        description: Value in minor units (cents)
      available:
        type: boolean
        default: true
  MenuItemUpdateRequest:
    type: object
    properties:
      name:
        type: string
        maxLength: 255
      description:
        type: string
        maxLength: 1000
      imagePath:
        type: string
        maxLength: 255
      price:
        type: integer
        format: int64
        minimum: 0
        description: Value in minor units (cents)
      available:
        type: boolean
  Order:
    type: object
    required:
      - id
      - createdAt
      - source
    properties:
      id:
        type: string
        format: uuid
      createdAt:
        type: string
        format: date-time
      totalPrice:
        type: integer
        format: int64
        description: Value in minor units (cents)
      source:
        type: string
        enum:
          - TABLET
          - WAITER
          - KIOSK
          - WEB
      table:
        type: integer
        format: int32
        description: Table number for dine-in orders
      status:
        type: string
        enum:
          - CREATED
          - PREPARING
          - READY
          - SERVED
          - CANCELLED
          - PAID
        description: Current order status
      items:
        type: array
        items:
          $ref: '#/definitions/OrderItem'
  OrderCreateRequest:
    type: object
    required:
      - source
      - items
      - table
    properties:
      source:
        type: string
        enum:
          - TABLET
          - WAITER
          - KIOSK
          - WEB
      table:
        type: integer
        format: int32
        description: Table number for dine-in orders
      items:
        type: array
        minItems: 1
        items:
          $ref: '#/definitions/OrderItemCreateRequest'
  OrderItem:
    type: object
    required:
      - id
      - orderId
      - menuItemId
      - quantity
      - unitPrice
    properties:
      id:
        type: string
        format: uuid
      orderId:
        type: string
        format: uuid
      menuItemId:
        type: string
        format: uuid
      quantity:
        type: integer
        format: int32
        minimum: 1
      unitPrice:
        type: integer
        format: int64
        description: Value in minor units (cents)
      createdAt:
        type: string
        format: date-time
      status:
        type: string
        enum:
          - CREATED
          - PREPARING
          - READY
          - SERVED
          - CANCELLED
        description: Current item status
  OrderItemCreateRequest:
    type: object
    required:
      - menuId
      - menuItemId
      - quantity
    properties:
      menuId:
        type: string
        format: uuid
        description: Menu ID for validation
      menuItemId:
        type: string
        format: uuid
        description: Menu item ID to add
      quantity:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
  OrderItemUpdateRequest:
    type: object
    required:
      - quantity
    properties:
      quantity:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
  OrderStatusHistory:
    type: object
    required:
      - id
      - orderId
      - status
      - timestamp
      - updatedBy
    properties:
      id:
        type: string
        format: uuid
      orderId:
        type: string
        format: uuid
      status:
        type: string
        enum:
          - CREATED
          - PREPARING
          - READY
