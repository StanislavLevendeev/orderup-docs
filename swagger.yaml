        '400': *ref_0
        '401': *ref_1
        '403': *ref_2
        '404':
          $ref: '#/responses/NotFound'
        '409': *ref_3
      description: >-


        Access Control: Endpoint requires specific authenticated Roles. See
        implementation.
    put:
      tags:
        - menu
      summary: Update menu
      operationId: updateMenu
      parameters:
        - $ref: '#/parameters/MenuIdPathParam'
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/MenuUpdateRequest'
      responses:
        '200':
          description: Menu updated
          schema:
            $ref: '#/definitions/Menu'
        '400': *ref_0
        '401': *ref_1
        '403': *ref_2
        '404':
          $ref: '#/responses/NotFound'
