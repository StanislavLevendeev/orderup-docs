          schema:
            $ref: '#/definitions/Order'
        '400': *ref_0
        '401': *ref_1
        '403': *ref_2
        '409': *ref_3
      description: >-


        Access Control: Endpoint requires specific authenticated Roles. See
        implementation.
  /orders/{orderId}:
    get:
      tags:
        - order
      summary: Get order by ID
      operationId: getOrderById
      parameters:
        - $ref: '#/parameters/OrderIdPathParam'
      responses:
        '200':
          description: Order returned
          schema:
            $ref: '#/definitions/Order'
        '400': *ref_0
        '401': *ref_1
        '403': *ref_2
        '404':
          $ref: '#/responses/NotFound'
        '409': *ref_3
      description: >-


        Access Control: Endpoint requires specific authenticated Roles. See
