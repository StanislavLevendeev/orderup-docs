---
swagger: "2.0"
info:
  title: "OrderUp API"
  version: "2.0.0"
  description: |
    API documentation for the OrderUp microservices platform.

    External client traffic is handled by NGINX API Gateway, which routes requests to domain services.
    Service discovery is handled by Consul so service instances can register and be resolved dynamically.

    Communication patterns:
    - Synchronous: REST + JSON for operations that require immediate responses.
    - Asynchronous: ActiveMQ message topics for order and order-item status change events.
    - Real-time push: WebSocket topics for kitchen/tablet updates.

host: "localhost:80"
basePath: ""
schemes:
  - "http"
consumes:
  - "application/json"
produces:
  - "application/json"
tags:
  - name: "menu"
    description: "Menu management"
  - name: "menu-item"
    description: "Menu item management"
  - name: "order"
    description: "Order and order item operations"
  - name: "order-status"
    description: "Order and order-item status tracking"
  - name: "payment"
    description: "Payment registration and status"
  - name: "notification"
    description: "WebSocket notification operations"

paths:
  /menus:
    get:
      tags:
        - "menu"
      summary: "List menus"
      operationId: "listMenus"
      parameters:
        - name: "active"
          in: "query"
          required: false
          type: "boolean"
          description: "Filter only active menus"
      responses:
        200:
          description: "Menus returned"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/Menu"
    post:
      tags:
        - "menu"
      summary: "Create a menu"
      operationId: "createMenu"
      parameters:
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/MenuCreateRequest"
      responses:
        201:
          description: "Menu created"
          schema:
            $ref: "#/definitions/Menu"

  /menus/{menuId}:
    get:
      tags:
        - "menu"
      summary: "Get menu by ID"
      operationId: "getMenuById"
      parameters:
        - $ref: "#/parameters/MenuIdPathParam"
      responses:
        200:
          description: "Menu returned"
          schema:
            $ref: "#/definitions/Menu"
        404:
          $ref: "#/responses/NotFound"
    put:
      tags:
        - "menu"
      summary: "Update menu"
      operationId: "updateMenu"
      parameters:
        - $ref: "#/parameters/MenuIdPathParam"
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/MenuUpdateRequest"
      responses:
        200:
          description: "Menu updated"
          schema:
            $ref: "#/definitions/Menu"
        404:
          $ref: "#/responses/NotFound"
    delete:
      tags:
        - "menu"
      summary: "Delete menu"
      operationId: "deleteMenu"
      parameters:
        - $ref: "#/parameters/MenuIdPathParam"
      responses:
        204:
          description: "Menu deleted"
        404:
          $ref: "#/responses/NotFound"

  /menus/{menuId}/items:
    get:
      tags:
        - "menu-item"
      summary: "List menu items for a menu"
      operationId: "listMenuItems"
      parameters:
        - $ref: "#/parameters/MenuIdPathParam"
        - name: "available"
          in: "query"
          required: false
          type: "boolean"
      responses:
        200:
          description: "Menu items returned"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/MenuItem"
        404:
          $ref: "#/responses/NotFound"
    post:
      tags:
        - "menu-item"
      summary: "Create menu item"
      operationId: "createMenuItem"
      parameters:
        - $ref: "#/parameters/MenuIdPathParam"
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/MenuItemCreateRequest"
      responses:
        201:
          description: "Menu item created"
          schema:
            $ref: "#/definitions/MenuItem"
        404:
          $ref: "#/responses/NotFound"

  /menus/{menuId}/items/{menuItemId}:
    get:
      tags:
        - "menu-item"
      summary: "Get menu item by ID"
      operationId: "getMenuItemById"
      parameters:
        - $ref: "#/parameters/MenuIdPathParam"
        - $ref: "#/parameters/MenuItemIdPathParam"
      responses:
        200:
          description: "Menu item returned"
          schema:
            $ref: "#/definitions/MenuItem"
        404:
          $ref: "#/responses/NotFound"
    put:
      tags:
        - "menu-item"
      summary: "Update menu item"
      operationId: "updateMenuItem"
      parameters:
        - $ref: "#/parameters/MenuIdPathParam"
        - $ref: "#/parameters/MenuItemIdPathParam"
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/MenuItemUpdateRequest"
      responses:
        200:
          description: "Menu item updated"
          schema:
            $ref: "#/definitions/MenuItem"
        404:
          $ref: "#/responses/NotFound"
    delete:
      tags:
        - "menu-item"
      summary: "Delete menu item"
      operationId: "deleteMenuItem"
      parameters:
        - $ref: "#/parameters/MenuIdPathParam"
        - $ref: "#/parameters/MenuItemIdPathParam"
      responses:
        204:
          description: "Menu item deleted"
        404:
          $ref: "#/responses/NotFound"

  /orders:
    get:
      tags:
        - "order"
      summary: "List orders"
      operationId: "listOrders"
      parameters:
        - name: "source"
          in: "query"
          required: false
          type: "string"
          enum:
            - "TABLET"
            - "WAITER"
            - "WEB"
        - name: "status"
          in: "query"
          required: false
          type: "string"
          enum:
            - "CREATED"
            - "PREPARING"
            - "READY"
            - "SERVED"
            - "CANCELLED"
            - "PAID"
      responses:
        200:
          description: "Orders returned"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/Order"
    post:
      tags:
        - "order"
      summary: "Create order"
      operationId: "createOrder"
      parameters:
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/OrderCreateRequest"
      responses:
        201:
          description: "Order created"
          schema:
            $ref: "#/definitions/Order"

  /orders/{orderId}:
    get:
      tags:
        - "order"
      summary: "Get order by ID"
      operationId: "getOrderById"
      parameters:
        - $ref: "#/parameters/OrderIdPathParam"
      responses:
        200:
          description: "Order returned"
          schema:
            $ref: "#/definitions/Order"
        404:
          $ref: "#/responses/NotFound"

  /orders/{orderId}/items:
    post:
      tags:
        - "order"
      summary: "Add item to order"
      operationId: "addOrderItem"
      parameters:
        - $ref: "#/parameters/OrderIdPathParam"
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/OrderItemCreateRequest"
      responses:
        201:
          description: "Order item added"
          schema:
            $ref: "#/definitions/OrderItem"
        404:
          $ref: "#/responses/NotFound"

  /orders/{orderId}/items/{orderItemId}:
    put:
      tags:
        - "order"
      summary: "Update quantity of an order item"
      operationId: "updateOrderItem"
      parameters:
        - $ref: "#/parameters/OrderIdPathParam"
        - $ref: "#/parameters/OrderItemIdPathParam"
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/OrderItemUpdateRequest"
      responses:
        200:
          description: "Order item updated"
          schema:
            $ref: "#/definitions/OrderItem"
        404:
          $ref: "#/responses/NotFound"
    delete:
      tags:
        - "order"
      summary: "Remove item from order"
      operationId: "deleteOrderItem"
      parameters:
        - $ref: "#/parameters/OrderIdPathParam"
        - $ref: "#/parameters/OrderItemIdPathParam"
      responses:
        204:
          description: "Order item removed"
        404:
          $ref: "#/responses/NotFound"

  /orders/{orderId}/status:
    get:
      tags:
        - "order-status"
      summary: "Get the current order status"
      operationId: "getOrderStatus"
      parameters:
        - $ref: "#/parameters/OrderIdPathParam"
      responses:
        200:
          description: "Order status returned"
          schema:
            $ref: "#/definitions/OrderStatus"
        404:
          $ref: "#/responses/NotFound"
    post:
      tags:
        - "order-status"
      summary: "Append order status event"
      description: "Also publishes OrderStatusChangedEvent to ActiveMQ topic order-status-changed."
      operationId: "appendOrderStatus"
      parameters:
        - $ref: "#/parameters/OrderIdPathParam"
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/OrderStatusHistoryCreateRequest"
      responses:
        201:
          description: "Order status event appended"
          schema:
            $ref: "#/definitions/OrderStatusHistory"
        404:
          $ref: "#/responses/NotFound"

  /orders/{orderId}/status-history:
    get:
      tags:
        - "order-status"
      summary: "Get order status history"
      operationId: "getOrderStatusHistory"
      parameters:
        - $ref: "#/parameters/OrderIdPathParam"
      responses:
        200:
          description: "Order status history returned"
          schema:
            type: "array"
            item:
              $ref: "#/definitions/OrderStatusHistory"
        404:
          $ref: "#/responses/NotFound"

  /orders/{orderId}/items/{orderItemId}/status:
    get:
      tags:
        - "order-status"
      summary: "Get the latest order item status"
      operationId: "getOrderItemStatus"
      parameters:
        - $ref: "#/parameters/OrderIdPathParam"
        - $ref: "#/parameters/OrderItemIdPathParam"
      responses:
        200:
          description: "Order item status returned"
          schema:
            $ref: "#/definitions/OrderItemStatus"
        404:
          $ref: "#/responses/NotFound"
    post:
      tags:
        - "order-status"
      summary: "Append order item status event"
      description: "Also publishes OrderItemStatusChangedEvent to ActiveMQ topic order-item-status-changed."
      operationId: "appendOrderItemStatus"
      parameters:
        - $ref: "#/parameters/OrderIdPathParam"
        - $ref: "#/parameters/OrderItemIdPathParam"
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/OrderItemStatusHistoryCreateRequest"
      responses:
        201:
          description: "Order item status event appended"
          schema:
            $ref: "#/definitions/OrderItemStatusHistory"
        404:
          $ref: "#/responses/NotFound"

  /orders/{orderId}/items/{orderItemId}/status-history:
    get:
      tags:
        - "order-status"
      summary: "Get the order item status history"
      operationId: "getOrderItemStatusHistory"
      parameters:
        - $ref: "#/parameters/OrderIdPathParam"
        - $ref: "#/parameters/OrderItemIdPathParam"
      responses:
        200:
          description: "Order item status history returned"
          schema:
            type: "array"
            item:
              $ref: "#/definitions/OrderItemStatusHistory"
        404:
          $ref: "#/responses/NotFound"

  /orders/{orderId}/payments:
    get:
      tags:
        - "payment"
      summary: "Get payments by order ID"
      operationId: "getPaymentByOrderId"
      parameters:
        - $ref: "#/parameters/OrderIdPathParam"
      responses:
        200:
          description: "Payments returned"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/Payment"
        404:
          $ref: "#/responses/NotFound"
    post:
      tags:
        - "payment"
      summary: "Register payment for order"
      operationId: "createPayment"
      parameters:
        - $ref: "#/parameters/OrderIdPathParam"
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/PaymentCreateRequest"
      responses:
        201:
          description: "Payment created"
          schema:
            $ref: "#/definitions/Payment"
        404:
          $ref: "#/responses/NotFound"

  /payments/{paymentId}:
    get:
      tags:
        - "payment"
      summary: "Get payment by payment ID"
      operationId: "getPaymentByPaymentId"
      parameters:
        - $ref: "#/parameters/PaymentIdPathParam"
      responses:
        200:
          description: "Payment returned"
          schema:
            $ref: "#/definitions/Payment"
        404:
          $ref: "#/responses/NotFound"

  /notifications/ws:
    get:
      tags:
        - "notification"
      summary: "WebSocket handshake endpoint"
      description: |
        HTTP upgrade endpoint used by clients to establish WebSocket sessions.
        After connecting, clients subscribe to destination /topic/orders/{orderId}
        to receive order-specific real-time status updates.
      operationId: "websocketHandshake"
      produces:
        - "application/json"
      responses:
        101:
          description: "Switching Protocols"
        426:
          description: "Upgrade Required"

parameters:
  MenuIdPathParam:
    name: "menuId"
    in: "path"
    required: true
    type: "string"
    format: "uuid"
  MenuItemIdPathParam:
    name: "menuItemId"
    in: "path"
    required: true
    type: "string"
    format: "uuid"
  OrderIdPathParam:
    name: "orderId"
    in: "path"
    required: true
    type: "string"
    format: "uuid"
  PaymentIdPathParam:
    name: "paymentId"
    in: "path"
    required: true
    type: "string"
    format: "uuid"
  OrderItemIdPathParam:
    name: "orderItemId"
    in: "path"
    required: true
    type: "string"
    format: "uuid"

responses:
  NotFound:
    description: "Entity not found"
    schema:
      $ref: "#/definitions/ErrorResponse"

securityDefinitions:
  bearerAuth:
    type: "apiKey"
    name: "Authorization"
    in: "header"

security:
  - bearerAuth: []

definitions:
  Menu:
    type: "object"
    required:
      - "id"
      - "name"
      - "active"
    properties:
      id:
        type: "string"
        format: "uuid"
      name:
        type: "string"
      active:
        type: "boolean"
      items:
        type: "array"
        items:
          $ref: "#/definitions/MenuItem"

  MenuCreateRequest:
    type: "object"
    required:
      - "name"
      - "active"
    properties:
      name:
        type: "string"
      active:
        type: "boolean"
        default: true

  MenuUpdateRequest:
    type: "object"
    required:
      - "name"
      - "active"
    properties:
      name:
        type: "string"
      active:
        type: "boolean"

  MenuItem:
    type: "object"
    required:
      - "id"
      - "name"
      - "price"
      - "available"
    properties:
      id:
        type: "string"
        format: "uuid"
      name:
        type: "string"
      description:
        type: "string"
      imagePath:
        type: "string"
      price:
        type: "number"
        format: "double"
      available:
        type: "boolean"

  MenuItemCreateRequest:
    type: "object"
    required:
      - "name"
      - "price"
    properties:
      name:
        type: "string"
      description:
        type: "string"
      imagePath:
        type: "string"
      price:
        type: "number"
        format: "double"
      available:
        type: "boolean"
        default: true

  MenuItemUpdateRequest:
    type: "object"
    properties:
      name:
        type: "string"
      description:
        type: "string"
      imagePath:
        type: "string"
      price:
        type: "number"
        format: "double"
        minimum: 0
      available:
        type: "boolean"

  Order:
    type: "object"
    required:
      - "id"
      - "createdAt"
      - "source"
    properties:
      id:
        type: "string"
        format: "uuid"
      createdAt:
        type: "string"
        format: "date-time"
      totalPrice:
        type: "number"
        format: "double"
      source:
        type: "string"
        enum:
          - "TABLET"
          - "WAITER"
          - "KIOSK"
          - "WEB"
      table:
        type: "integer"
        format: "int32"
        description: "Table number for dine-in orders"
      status:
        type: "string"
        enum:
          - "CREATED"
          - "PREPARING"
          - "READY"
          - "SERVED"
          - "CANCELLED"
          - "PAID"
        description: "Current order status"
      items:
        type: "array"
        items:
          $ref: "#/definitions/OrderItem"

  OrderCreateRequest:
    type: "object"
    required:
      - "source"
      - "items"
      - "table"
    properties:
      source:
        type: "string"
        enum:
          - "TABLET"
          - "WAITER"
          - "KIOSK"
          - "WEB"
      table:
        type: "integer"
        format: "int32"
        description: "Table number for dine-in orders"
      items:
        type: "array"
        minItems: 1
        items:
          $ref: "#/definitions/OrderItemCreateRequest"

  OrderItem:
    type: "object"
    required:
      - "id"
      - "orderId"
      - "menuItemId"
      - "quantity"
      - "unitPrice"
    properties:
      id:
        type: "string"
        format: "uuid"
      orderId:
        type: "string"
        format: "uuid"
      menuItemId:
        type: "string"
        format: "uuid"
      quantity:
        type: "integer"
        format: "int32"
        minimum: 1
      unitPrice:
        type: "number"
        format: "double"
        description: "Price per unit at time of order"
      createdAt:
        type: "string"
        format: "date-time"
      status:
        type: "string"
        enum:
          - "CREATED"
          - "PREPARING"
          - "READY"
          - "SERVED"
          - "CANCELLED"
        description: "Current item status"

  OrderItemCreateRequest:
    type: "object"
    required:
      - "menuId"
      - "menuItemId"
      - "quantity"
    properties:
      menuId:
        type: "string"
        format: "uuid"
        description: "Menu ID for validation"
      menuItemId:
        type: "string"
        format: "uuid"
        description: "Menu item ID to add"
      quantity:
        type: "integer"
        format: "int32"
        minimum: 1

  OrderItemUpdateRequest:
    type: "object"
    required:
      - "quantity"
    properties:
      quantity:
        type: "integer"
        format: "int32"
        minimum: 1

  OrderStatusHistory:
    type: "object"
    required:
      - "id"
      - "orderId"
      - "status"
      - "timestamp"
      - "updatedBy"
    properties:
      id:
        type: "string"
        format: "uuid"
      orderId:
        type: "string"
        format: "uuid"
      status:
        type: "string"
        enum:
          - "CREATED"
          - "PREPARING"
          - "READY"
          - "SERVED"
          - "CANCELLED"
          - "PAID"
      timestamp:
        type: "string"
        format: "date-time"
      updatedBy:
        type: "string"

  OrderStatusHistoryCreateRequest:
    type: "object"
    required:
      - "status"
      - "updatedBy"
    properties:
      status:
        type: "string"
        enum:
          - "CREATED"
          - "PREPARING"
          - "READY"
          - "SERVED"
          - "CANCELLED"
          - "PAID"
      updatedBy:
        type: "string"

  OrderItemStatusHistory:
    type: "object"
    required:
      - "id"
      - "orderItemId"
      - "status"
      - "timestamp"
      - "updatedBy"
    properties:
      id:
        type: "string"
        format: "uuid"
      orderItemId:
        type: "string"
        format: "uuid"
      status:
        type: "string"
        enum:
          - "CREATED"
          - "PREPARING"
          - "READY"
          - "SERVED"
          - "CANCELLED"
      timestamp:
        type: "string"
        format: "date-time"
      updatedBy:
        type: "string"

  OrderItemStatusHistoryCreateRequest:
    type: "object"
    required:
      - "status"
      - "updatedBy"
    properties:
      status:
        type: "string"
        enum:
          - "CREATED"
          - "PREPARING"
          - "READY"
          - "SERVED"
          - "CANCELLED"
      updatedBy:
        type: "string"

  Payment:
    type: "object"
    required:
      - "id"
      - "orderId"
      - "amount"
      - "status"
      - "method"
      - "createdAt"
    properties:
      id:
        type: "string"
        format: "uuid"
      orderId:
        type: "string"
        format: "uuid"
      amount:
        type: "number"
        format: "double"
      status:
        type: "string"
        enum:
          - "PENDING"
          - "AUTHORIZED"
          - "PAID"
          - "FAILED"
          - "REFUNDED"
      method:
        type: "string"
        example: "CARD"
      createdAt:
        type: "string"
        format: "date-time"
      updatedAt:
        type: "string"
        format: "date-time"
        description: "Last update timestamp"
      transactionId:
        type: "string"
        description: "External payment gateway transaction ID"
      failureReason:
        type: "string"
        description: "Reason for payment failure if applicable"

  PaymentCreateRequest:
    type: "object"
    required:
      - "method"
    properties:
      method:
        type: "string"
        description: "Payment method (e.g., CARD, CASH, DIGITAL_WALLET)"
        example: "CARD"

  OrderItemStatusChangedEvent:
    type: "object"
    required:
      - "orderId"
      - "orderItemId"
      - "newStatus"
      - "oldStatus"
      - "timestamp"
      - "updatedBy"
      - "eventId"
    properties:
      orderId:
        type: "string"
        format: "uuid"
      orderItemId:
        type: "string"
        format: "uuid"
      newStatus:
        type: "string"
        enum:
          - "CREATED"
          - "PREPARING"
          - "READY"
          - "SERVED"
          - "CANCELLED"
      oldStatus:
        type: "string"
        enum:
          - "CREATED"
          - "PREPARING"
          - "READY"
          - "SERVED"
          - "CANCELLED"
        description: "Previous status before transition"
      timestamp:
        type: "string"
        format: "date-time"
      updatedBy:
        type: "string"
        description: "User or service that made the status change"
      eventId:
        type: "string"
        description: "Unique identifier for idempotent processing"

  OrderStatusChangedEvent:
    type: "object"
    required:
      - "orderId"
      - "newStatus"
      - "oldStatus"
      - "timestamp"
      - "updatedBy"
      - "eventId"
    properties:
      orderId:
        type: "string"
        format: "uuid"
      newStatus:
        type: "string"
        enum:
          - "CREATED"
          - "PREPARING"
          - "READY"
          - "SERVED"
          - "PAID"
          - "CANCELLED"
      oldStatus:
        type: "string"
        enum:
          - "CREATED"
          - "PREPARING"
          - "READY"
          - "SERVED"
          - "PAID"
          - "CANCELLED"
        description: "Previous status before transition"
      timestamp:
        type: "string"
        format: "date-time"
      updatedBy:
        type: "string"
        description: "User or service that made the status change"
      eventId:
        type: "string"
        description: "Unique identifier for idempotent processing"

  OrderTopicSubscriptionInfo:
    type: "object"
    required:
      - "orderId"
      - "subscriberCount"
    properties:
      orderId:
        type: "string"
        format: "uuid"
      subscriberCount:
        type: "integer"
        format: "int32"
        minimum: 0

  ErrorResponse:
    type: "object"
    required:
      - "code"
      - "message"
      - "timestamp"
    properties:
      code:
